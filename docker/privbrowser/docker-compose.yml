services:
  vpn:
    image: qmcgaw/gluetun
    container_name: proton_vpn
    # NET_ADMIN is required for the container to create VPN tunnels
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      # Replace this with your WireGuard Private Key from the ProtonVPN dashboard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      # Optional: Pick a specific country or let it pick the fastest
      #- SERVER_COUNTRIES=Switzerland
    ports:
      # MAGIC TRICK: We expose LibreWolf's port (3000) on the VPN container!
      - "${BROWSER_HTTP_PORT}:3000" 
      - "${BROWSER_HTTPS_PORT}:3001"
    restart: unless-stopped

  browser:
    image: lscr.io/linuxserver/librewolf:latest
    container_name: librewolf_sandbox
    # This is the line that forces LibreWolf inside the VPN's network namespace
    network_mode: "service:vpn"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    depends_on:
      - vpn
        # LibreWolf won't start until the VPN successfully connects

    restart: unless-stopped