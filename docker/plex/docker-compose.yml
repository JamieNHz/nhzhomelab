services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=latest
    volumes:
      # Local folder for Plex metadata, cache, and posters
      - ./config:/config
      # Pulls your MergerFS pool path from the master .env
      - ${MEDIA_DIR}:/media
    ports:
      # Pulls your custom port from the master .env
      - "${PLEX_PORT}:32400"
    devices:
      # The AMD GPU Passthrough for hardware-accelerated transcoding
      - /dev/dri:/dev/dri
    restart: unless-stopped